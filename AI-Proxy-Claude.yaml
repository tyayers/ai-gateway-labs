name: AI-Proxy-Claude
type: template
description: API template for AI-Proxy-Claude
features:
  - AI-Model-Governance.yaml
  - AI-Auth.yaml
parameters:
  - name: ModelBasePath
    paths:
      - $.endpoints[:1].basePath
    description: The base path to offer the AI proxy on.
    default: /claude
    examples:
      - /gemini
      - /llm
  - name: AllowedModelPatterns
    displayName: AllowedModelPatterns
    description: Configuration input for AllowedModelPatterns
    default: claude
    examples:
      - google
      - anthropic
    maps: {}
  - name: DeniedModelPatterns
    displayName: DeniedModelPatterns
    description: Configuration input for DeniedModelPatterns
    default: ""
    examples:
      - flash
      - pro
    maps: {}
  - name: OverrideModel
    displayName: OverrideModel
    description: Configuration input for OverrideModel
    default: ""
    examples:
      - google/gemini-flash-latest
    maps: {}
  - name: DefaultModel
    displayName: DefaultModel
    description: Configuration input for DefaultModel
    default: ""
    examples:
      - google/gemini-flash-latest
    maps: {}
  - name: FallbackModel
    displayName: FallbackModel
    description: Configuration input for FallbackModel
    default: google/gemini-flash-latest
    examples:
      - google/gemini-flash-latest
    maps: {}
endpoints:
  - name: agentplatform
    basePath: /model
    routes:
      - name: default
        target: agentplatform
targets:
  - name: agentplatform
    url: https://aiplatform.googleapis.com
    auth: GoogleAccessToken
    scopes:
      - https://www.googleapis.com/auth/cloud-platform
